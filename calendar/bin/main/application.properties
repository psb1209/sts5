# Application name
spring.application.name=calendar

# Tomcat
server.port=8091

# DevTools
spring.devtools.restart.enabled=true

# Thymeleaf
spring.thymeleaf.cache=false 
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.check-template-location=true 

#MariaDb
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/DB_CALENDAR
spring.datasource.username=root
spring.datasource.password=1234

#log4j2
logging.config=classpath:logger/log4j2.xml

#Mybatis
mybatis.config-location=classpath:mybatis/config/mybatis-config.xml
mybatis.mapper-locations=classpath:mybatis/mappers/member-mapper.xml

#JPA
#현재 mariadb sql문법을 사용하도록 정의
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# 테이블 자동 생성 설정으로 만약 테이블이 없다면 새로 생성하고,
# 기존 테이블이 있다면 테이블 구조가 엔티티 클래스에 맞게 변경됩니다.
# 즉, 테이블이 이미 존재하면 생성하지 않고, 필요 부분만 변경합니다.
# 지금은 주석 처리해서 지금까지 사용한 테이블을 그대로 사용하기로 합니다.
#(처음에는 주석해놓는게 좋음)
#spring.jpa.hibernate.ddl-auto=update

# 실행되는 SQL문을 콘솔에 출력하도록 설정합니다.
spring.jpa.show-sql=true

# SQL문을 보기 좋게 출력하도록 설정합니다.
spring.jpa.properties.hibernate.format_sql=true

