<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:replace="~{/include/title.html::title}"></title>
<link rel="stylesheet" th:href="@{/css/common.css}">
<link rel="stylesheet" th:href="@{/css/header_nav_footer.css}">
<link rel="stylesheet" th:href="@{/css/member.css}">

<script th:src="@{/js/member.js}"></script>

</head>
<body>

	<header th:replace="~{/include/header_nav_footer.html::header}"></header>
	
	<nav th:replace="~{/include/header_nav_footer.html::nav}"></nav>
	
	<section>
	<div id="section_wrap">
		<div class="word">
			SIGN-UP-FORM
		</div>
		
		<div class="content">
			<form th:action="@{/member/signup_confirm}" name="signup_form" method="post">
			
			<input type="text" name="id" placeholder="INPUT NEW MEMEBER ID"><br>
			<input type="password" name="pw" placeholder="INPUT NEW MEMEBER PW"><br>
			<input type="email" name="mail" placeholder="INPUT NEW MEMEBER MAIL"><br>
			<input type="text" name="phone" placeholder="INPUT NEW MEMEBER PHONE"><br>
			<input type="button" value="sign-up" onclick="signupForm();">
			<input type="reset" value="reset">
			
			</form>
		</div>
		
	</div>
	</section>
	
	<footer th:replace="~{/include/header_nav_footer.html::footer}"></footer>
	

</body>
</html>
